name: Contested Strike
description: >
  6 drones execute a coordinated strike mission against a defended target
  with active SAM threats and EW jamming.  Tests adversarial prediction,
  regime switching (PATROL -> ENGAGE -> EVADE), dark pool task allocation,
  and kill zone adaptation after losses.

  The scenario is designed to force at least one regime transition and
  validate that the auction-based allocation produces survivable approach
  vectors that avoid known threat envelopes.

duration_seconds: 480

drones:
  count: 6
  types:
    recon_pair:
      count: 2
      type: quadrotor
      sensors: [camera, imu, baro, mag, ew_receiver]
      capabilities:
        has_sensor: true
        has_weapon: false
        has_ew: true
        has_relay: false
      max_speed_ms: 25.0
    strike_element:
      count: 3
      type: fixed_wing
      sensors: [camera, imu, baro, mag, targeting_pod]
      capabilities:
        has_sensor: true
        has_weapon: true
        has_ew: false
        has_relay: false
      max_speed_ms: 40.0
    relay:
      count: 1
      type: quadrotor
      sensors: [imu, baro, mag]
      capabilities:
        has_sensor: false
        has_weapon: false
        has_ew: false
        has_relay: true
      max_speed_ms: 15.0

  initial_positions:
    - [0, -800, -80]     # Recon 1
    - [50, -800, -80]    # Recon 2
    - [-200, -1000, -100] # Strike 1
    - [0, -1000, -100]    # Strike 2
    - [200, -1000, -100]  # Strike 3
    - [0, -900, -120]     # Relay

  initial_energy: 1.0
  endurance_s: 1200

environment:
  gps_available: true
  wind_speed_ms: 8
  wind_direction_deg: 180
  visibility: moderate
  terrain: hilly
  temperature_c: 18

mission:
  type: strike
  target:
    position: [0, 0, 0]
    type: static_installation
    hardness: medium
    required_hits: 2
  ingress_corridor:
    start: [0, -500, -80]
    end: [0, 0, -60]
    width_m: 200
  egress_point: [0, -1000, -100]
  dark_pool_enabled: true
  dark_pool_strike_swarm_id: 42
  rules_of_engagement:
    weapons_free: true
    collateral_limit_m: 50
    min_confidence_for_release: 0.8

threats:
  - id: 1
    type: sam
    position: [150, -200, 0]
    lethal_radius_m: 300
    detection_radius_m: 500
    reaction_time_s: 5
    max_engagements: 4
    description: "SA-8 Gecko -- short-range mobile SAM"

  - id: 2
    type: sam
    position: [-200, -100, 0]
    lethal_radius_m: 250
    detection_radius_m: 400
    reaction_time_s: 8
    max_engagements: 2
    description: "SA-9 Gaskin -- IR-guided SAM"

  - id: 3
    type: electronic_warfare
    position: [0, -300, 0]
    effect_radius_m: 600
    effect_type: gps_jamming
    description: "GPS jammer -- creates GPS-denied zone around target"

  - id: 4
    type: small_arms
    position: [50, -50, 0]
    lethal_radius_m: 100
    description: "MANPADS team near target"

adversarial:
  n_enemy_particles: 500
  threat_transition_matrix:
    - [0.85, 0.10, 0.05]   # DEFEND -> [DEF, ATK, RET]
    - [0.08, 0.82, 0.10]   # ATTACK -> [DEF, ATK, RET]
    - [0.12, 0.08, 0.80]   # RETREAT -> [DEF, ATK, RET]

events:
  - time: 60
    type: threat_detection
    threat_id: 1
    detected_by: recon_1
    description: "Recon drone detects SAM radar emission"

  - time: 90
    type: threat_detection
    threat_id: 3
    detected_by: recon_2
    description: "GPS jamming detected -- trigger regime shift"

  - time: 150
    type: drone_loss
    drone_id: 0
    cause: sam_engagement
    position: [100, -250, -70]
    description: "Recon 1 destroyed by SA-8 -- kill zone created"

  - time: 180
    type: regime_transition
    from: engage
    to: evade
    trigger: attrition_threshold
    description: "Attrition triggers EVADE -- surviving drones re-route"

  - time: 240
    type: regime_transition
    from: evade
    to: engage
    trigger: threat_suppressed
    description: "SAM suppressed by EW -- resume approach"

success_criteria:
  target_hit: true
  min_hits: 2
  max_drone_losses: 2
  max_collateral_m: 50
  egress_successful: true
  min_drones_returned: 3

metrics:
  - time_to_first_strike_s
  - total_hits_on_target
  - drone_survival_rate
  - kill_zone_avoidance_effectiveness
  - regime_transitions_count
  - adversarial_prediction_accuracy
  - dark_pool_information_leakage
